<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerLeap - AI 职业情境模拟器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .hero-content {
      max-width: 700px;
      background: white;
      border-radius: 2rem;
      padding: 3rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }
    .btn-start {
      background: #2563eb;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 14px 48px;
      border-radius: 50px;
      border: none;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s;
    }
    .btn-start:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-content">
      <div style="font-size:2.5rem; margin-bottom:1rem;">🚀🤖💼</div>
      <h1>CareerLeap</h1>
      <p style="font-size:1.2rem; color:#475569;">AI 驱动的青年职业情境模拟器<br>科学测评 + 人工智能，为你量身推荐职业方向</p>

  <footer style="text-align:center; padding:1rem; color:#94a3b8;">

  </footer>

</html>
